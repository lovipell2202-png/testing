<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dropdown Options Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/dropdown-manager.css"/>
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 Dropdown Options Manager</h1>
      <p>Manage dropdown options for training records</p>
    </header>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('courses')">Course Titles</button>
      <button class="tab-btn" onclick="switchTab('providers')">Training Providers</button>
      <button class="tab-btn" onclick="switchTab('venues')">Venues</button>
      <button class="tab-btn" onclick="switchTab('trainers')">Trainers</button>
    </div>

    <!-- Course Titles Tab -->
    <div id="courses-tab" class="tab-content active">
      <div class="add-section">
        <h2>Add New Course Title</h2>
        <div class="input-group">
          <input type="text" id="new-course" placeholder="Enter course title (e.g., COMPANY ORIENTATION)" />
          <button class="btn-add" onclick="addOption('courses')">➕ Add</button>
        </div>
      </div>
      <div class="list-section">
        <h3>Current Course Titles</h3>
        <ul id="courses-list" class="options-list"></ul>
      </div>
    </div>

    <!-- Training Providers Tab -->
    <div id="providers-tab" class="tab-content">
      <div class="add-section">
        <h2>Add New Training Provider</h2>
        <div class="input-group">
          <input type="text" id="new-provider" placeholder="Enter provider name (e.g., NSB ENGINEERING)" />
          <button class="btn-add" onclick="addOption('providers')">➕ Add</button>
        </div>
      </div>
      <div class="list-section">
        <h3>Current Training Providers</h3>
        <ul id="providers-list" class="options-list"></ul>
      </div>
    </div>

    <!-- Venues Tab -->
    <div id="venues-tab" class="tab-content">
      <div class="add-section">
        <h2>Add New Venue</h2>
        <div class="input-group">
          <input type="text" id="new-venue" placeholder="Enter venue name (e.g., CONFERENCE ROOM)" />
          <button class="btn-add" onclick="addOption('venues')">➕ Add</button>
        </div>
      </div>
      <div class="list-section">
        <h3>Current Venues</h3>
        <ul id="venues-list" class="options-list"></ul>
      </div>
    </div>

    <!-- Trainers Tab -->
    <div id="trainers-tab" class="tab-content">
      <div class="add-section">
        <h2>Add New Trainer</h2>
        <div class="input-group">
          <input type="text" id="new-trainer" placeholder="Enter trainer name (e.g., J. RENZALES)" />
          <button class="btn-add" onclick="addOption('trainers')">➕ Add</button>
        </div>
      </div>
      <div class="list-section">
        <h3>Current Trainers</h3>
        <ul id="trainers-list" class="options-list"></ul>
      </div>
    </div>

    <div class="actions">
      <button class="btn-back" onclick="window.location.href='index.html'">← Back to Training Records</button>
      <button class="btn-reset" onclick="resetToDefaults()">🔄 Reset to Defaults</button>
    </div>
  </div>

  <script src="src/dropdown-manager.js"></script>
</body>
</html>
